<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業財經導覽終端</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --sidebar-color: #161616;
            --text-color: #c0c0c0;
            --accent-color: #2962ff;
            --hover-color: #2a2a2a;
            --border-color: #222;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        .container { display: flex; height: 100vh; width: 100vw; }

        /* 左側導航 */
        #sidebar {
            width: 260px; min-width: 180px; max-width: 500px;
            background-color: var(--sidebar-color);
            display: flex; flex-direction: column;
            border-right: 1px solid var(--border-color);
            z-index: 10;
        }

        .sidebar-header {
            padding: 25px 20px; font-size: 1.1rem; font-weight: 800;
            color: #fff; border-bottom: 1px solid var(--border-color);
            text-align: center; letter-spacing: 2px;
        }

        .menu-container { flex-grow: 1; overflow-y: auto; padding: 10px 0; }

        .category-title {
            padding: 15px 20px 5px; font-size: 0.7rem;
            color: #555; text-transform: uppercase; font-weight: bold;
        }

        .nav-item {
            padding: 12px 20px; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; text-decoration: none;
            color: var(--text-color); font-size: 0.9rem;
            border-left: 3px solid transparent;
        }

        .nav-item:hover { background-color: var(--hover-color); color: #fff; }
        .nav-item.active {
            background-color: #1e1e1e; border-left-color: var(--accent-color); color: #fff;
        }

        /* 拖動條 */
        #resizer {
            width: 6px; cursor: col-resize; background-color: #111;
            transition: background 0.3s;
        }
        #resizer:hover { background-color: var(--accent-color); }

        /* 右側主內容 */
        #main-content { flex-grow: 1; display: flex; flex-direction: column; background-color: #000; }

        .top-bar {
            height: 40px; background: #111; display: flex; align-items: center;
            padding: 0 15px; border-bottom: 1px solid #222; justify-content: space-between;
        }
        .url-display { font-size: 0.75rem; color: #555; }
        .open-btn {
            color: var(--accent-color); text-decoration: none; font-size: 0.75rem;
            padding: 2px 8px; border: 1px solid var(--accent-color); border-radius: 3px;
        }

        /* 內容區 */
        #iframe-container { flex-grow: 1; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: #000; }

        /* 廣告位 */
        .ad-space { background: #0f0f0f; display: flex; align-items: center; justify-content: center; color: #333; font-size: 11px; }
        .ad-top { height: 60px; width: 100%; border-bottom: 1px solid #222; }
        .ad-sidebar { height: 90px; margin: 15px; border: 1px dashed #222; }

        /* 特殊：隱藏 TradingView 的某些元素 */
        .tv-embed-container { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div id="sidebar">
        <div class="sidebar-header">FINANCE HUB</div>
        
        <div class="menu-container" id="menu">
            <!-- 由 JS 動態生成 -->
        </div>

        <div class="ad-space ad-sidebar">廣告位預留</div>
    </div>

    <div id="resizer"></div>

    <div id="main-content">
        <div class="ad-space ad-top">橫幅廣告位 728 x 60</div>
        
        <div class="top-bar">
            <div class="url-display" id="url-text">載入中...</div>
            <a href="#" id="external-link" target="_blank" class="open-btn">全螢幕開啟 ↗</a>
        </div>

        <div id="iframe-container">
            <iframe id="content-frame" name="content-frame"></iframe>
        </div>
    </div>
</div>

<script>
    // 網頁清單配置
    const sites = [
        { name: "即時財經新聞 (推薦)", url: "https://www.tradingview.com/embed-widget/timeline/?locale=zh_TW&colorTheme=dark", type: 'frame', cat: "財經資訊" },
        { name: "常用網址", url: "https://lisb0910.github.io/tv/bookmarks.html", type: 'frame', cat: "常用工具" },
        { name: "房租管家", url: "https://lisb0910.github.io/rent/rent.html", type: 'frame', cat: "常用工具" },
        
        { name: "開盤八法判斷", url: "https://lisb0910.github.io/tv/", type: 'frame', cat: "股市分析" },
        { name: "智能股票全方位分析", url: "https://copy-of-gemini-819624606168.us-west1.run.app/", type: 'frame', cat: "股市分析" },
        { name: "股市爆料同學會", url: "https://www.cmoney.tw/forum/stock/2344", type: 'jump', cat: "股市分析" },
        { name: "yahoo股市 (外開)", url: "https://tw.stock.yahoo.com/", type: 'jump', cat: "股市分析" },
        { name: "統一投信", url: "https://www.ezmoney.com.tw/member", type: 'jump', cat: "股市分析" },
        
        { name: "東森財經新聞", url: "https://www.youtube.com/embed/AEBeWMM1atA?autoplay=1&mute=1", type: 'frame', cat: "影音直播" },
        { name: "非凡新聞", url: "https://www.youtube.com/embed/xLqt2p6Dowo?autoplay=1&mute=1", type: 'frame', cat: "影音直播" },
        { name: "TVBS優選", url: "https://www.youtube.com/embed/WAUECPu9EOw?autoplay=1&mute=1", type: 'frame', cat: "影音直播" },
        
        { name: "TVBOX線路", url: "https://github.com/lisb0910/tv/blob/main/TVbox.txt", type: 'jump', cat: "系統" }
    ];

    const menuEl = document.getElementById('menu');
    const frame = document.getElementById('content-frame');
    const urlText = document.getElementById('url-text');
    const extLink = document.getElementById('external-link');

    // 生成菜單
    let currentCat = "";
    sites.forEach(site => {
        if (site.cat !== currentCat) {
            const catDiv = document.createElement('div');
            catDiv.className = 'category-title';
            catDiv.innerText = site.cat;
            menuEl.appendChild(catDiv);
            currentCat = site.cat;
        }
        const item = document.createElement('div');
        item.className = 'nav-item';
        item.innerText = site.name;
        item.onclick = () => loadSite(site, item);
        menuEl.appendChild(item);
    });

    function loadSite(site, element) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        element.classList.add('active');
        urlText.innerText = site.name;
        extLink.href = site.url;

        if (site.type === 'jump') {
            // 如果是無法嵌入的網頁，顯示提示並提供按鈕
            frame.srcdoc = `
                <body style="background:#000; color:#888; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif;">
                    <p>此網頁限制在框架內顯示</p>
                    <a href="${site.url}" target="_blank" style="color:#2962ff; text-decoration:none; border:1px solid #2962ff; padding:10px 20px; border-radius:5px;">在新標籤頁打開 ${site.name}</a>
                </body>`;
        } else {
            frame.srcdoc = "";
            frame.src = site.url;
        }
    }

    // 側邊欄拖動
    const sidebar = document.getElementById('sidebar');
    const resizer = document.getElementById('resizer');
    let isResizing = false;

    resizer.addEventListener('mousedown', () => { isResizing = true; frame.style.pointerEvents = 'none'; });
    document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        let width = e.clientX;
        if (width > 150 && width < 600) sidebar.style.width = width + 'px';
    });
    document.addEventListener('mouseup', () => { isResizing = false; frame.style.pointerEvents = 'auto'; });

    // 初始載入第一個
    document.querySelector('.nav-item').click();
</script>

</body>
</html>
