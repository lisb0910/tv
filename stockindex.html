<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>財經資訊門戶</title>
    <style>
        :root {
            --bg-color: #0f1114;
            --sidebar-color: #1a1d23;
            --text-color: #c9d1d9;
            --accent-color: #2f81f7;
            --hover-color: #2d333b;
            --border-color: #30363d;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        .container { display: flex; height: 100vh; width: 100vw; }

        /* 左側導航 */
        #sidebar {
            width: 260px; min-width: 180px; max-width: 500px;
            background-color: var(--sidebar-color);
            display: flex; flex-direction: column;
            border-right: 1px solid var(--border-color);
        }

        .sidebar-header {
            padding: 20px; font-size: 1.1rem; font-weight: bold;
            color: #fff; border-bottom: 1px solid var(--border-color);
            text-align: center; background: linear-gradient(to bottom, #21262d, #1a1d23);
        }

        .menu-container { flex-grow: 1; overflow-y: auto; padding: 10px 0; }

        .category-title {
            padding: 15px 20px 5px; font-size: 0.75rem;
            color: #8b949e; text-transform: uppercase; font-weight: bold;
        }

        .nav-item {
            padding: 12px 20px; cursor: pointer; transition: 0.2s;
            display: flex; justify-content: space-between; align-items: center;
            text-decoration: none; color: var(--text-color); font-size: 0.9rem;
            border-left: 3px solid transparent;
        }

        .nav-item:hover { background-color: var(--hover-color); color: #fff; }
        .nav-item.active {
            background-color: #21262d; border-left-color: var(--accent-color); color: #fff;
        }

        /* 拖動條 */
        #resizer { width: 4px; cursor: col-resize; background-color: #000; transition: 0.3s; }
        #resizer:hover { background-color: var(--accent-color); }

        /* 右側主內容 */
        #main-content { flex-grow: 1; display: flex; flex-direction: column; background-color: #000; position: relative; }

        .top-bar {
            height: 45px; background: #161b22; display: flex; align-items: center;
            padding: 0 15px; border-bottom: 1px solid var(--border-color);
            justify-content: space-between;
        }
        .status-dot { width: 8px; height: 8px; background: #238636; border-radius: 50%; display: inline-block; margin-right: 8px; }

        /* 內容區 */
        #iframe-area { flex-grow: 1; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: #000; }

        /* 廣告位 */
        .ad-space { background: #0d1117; display: flex; align-items: center; justify-content: center; color: #484f58; font-size: 11px; }
        .ad-top { height: 60px; width: 100%; border-bottom: 1px solid var(--border-color); }
        .ad-sidebar { height: 100px; margin: 15px; border: 1px dashed #30363d; border-radius: 6px; }

        /* 智能跳轉顯示 (針對不支援 iframe 的網頁) */
        #external-display {
            position: absolute; inset: 0; background: #0f1114;
            display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        .info-card {
            background: #161b22; padding: 40px; border-radius: 12px;
            border: 1px solid var(--border-color); max-width: 400px;
        }
        .btn-open {
            display: inline-block; margin-top: 20px; padding: 12px 30px;
            background: var(--accent-color); color: #fff; text-decoration: none;
            border-radius: 6px; font-weight: bold; transition: 0.3s;
        }
        .btn-open:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

<div class="container">
    <div id="sidebar">
        <div class="sidebar-header">財經即時終端</div>
        <div class="menu-container" id="menu"></div>
        <div class="ad-space ad-sidebar">SIDEBAR_ADS</div>
    </div>

    <div id="resizer"></div>

    <div id="main-content">
        <div class="ad-space ad-top">BANNER_ADS (728x60)</div>
        
        <div class="top-bar">
            <div style="font-size: 0.85rem;"><span class="status-dot"></span><span id="cur-title">載入中...</span></div>
            <div style="font-size: 0.75rem; color: #8b949e;" id="cur-url"></div>
        </div>

        <div id="iframe-area">
            <iframe id="main-frame" allow="autoplay; encrypted-media; fullscreen"></iframe>
            
            <div id="external-display">
                <div class="info-card">
                    <h3 id="ext-name" style="color:#fff; margin-top:0;"></h3>
                    <p style="font-size: 0.9rem; line-height: 1.6;">此網站設有安全保護，不允許在框架內直接顯示。請點擊下方按鈕在新分頁中瀏覽。</p>
                    <a href="#" id="ext-link" target="_blank" class="btn-open">立即開啟原始網頁</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const sites = [
        { name: "即時財經新聞直播", url: "https://www.youtube.com/embed/AEBeWMM1atA?autoplay=1&mute=1", type: "frame", cat: "即時資訊" },
        { name: "TradingView 新聞", url: "https://tw.tradingview.com/news/", type: "jump", cat: "即時資訊" },
        
        { name: "常用網址", url: "https://lisb0910.github.io/tv/bookmarks.html", type: "frame", cat: "工具清單" },
        { name: "房租管家", url: "https://lisb0910.github.io/rent/rent.html", type: "frame", cat: "工具清單" },
        
        { name: "開盤八法判斷", url: "https://lisb0910.github.io/tv/", type: "frame", cat: "股市分析" },
        { name: "智能股票分析", url: "https://copy-of-gemini-819624606168.us-west1.run.app/", type: "frame", cat: "股市分析" },
        { name: "股市爆料同學會", url: "https://www.cmoney.tw/forum/stock/2344", type: "jump", cat: "股市分析" },
        { name: "Yahoo股市", url: "https://tw.stock.yahoo.com/", type: "jump", cat: "股市分析" },
        { name: "統一投信", url: "https://www.ezmoney.com.tw/member", type: "jump", cat: "股市分析" },
        
        { name: "非凡新聞", url: "https://www.youtube.com/embed/xLqt2p6Dowo", type: "frame", cat: "新聞直播" },
        { name: "TVBS優選", url: "https://www.youtube.com/embed/WAUECPu9EOw", type: "frame", cat: "新聞直播" },
        { name: "TVBOX線路", url: "https://github.com/lisb0910/tv/blob/main/TVbox.txt", type: "jump", cat: "系統" }
    ];

    const menu = document.getElementById('menu');
    const frame = document.getElementById('main-frame');
    const extDisplay = document.getElementById('external-display');
    const curTitle = document.getElementById('cur-title');
    const curUrl = document.getElementById('cur-url');
    const extLink = document.getElementById('ext-link');
    const extName = document.getElementById('ext-name');

    let lastCat = "";
    sites.forEach((site, index) => {
        if (site.cat !== lastCat) {
            const t = document.createElement('div');
            t.className = 'category-title';
            t.innerText = site.cat;
            menu.appendChild(t);
            lastCat = site.cat;
        }
        const item = document.createElement('div');
        item.className = 'nav-item';
        item.innerHTML = `<span>${site.name}</span> <span style="font-size:10px; opacity:0.5">${site.type === 'jump' ? '↗' : ''}</span>`;
        item.onclick = () => loadSite(site, item);
        menu.appendChild(item);
        if (index === 0) loadSite(site, item);
    });

    function loadSite(site, el) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        curTitle.innerText = site.name;
        curUrl.innerText = site.url;

        if (site.type === "jump") {
            frame.style.display = 'none';
            extDisplay.style.display = 'flex';
            extLink.href = site.url;
            extName.innerText = site.name;
            frame.src = "about:blank";
        } else {
            extDisplay.style.display = 'none';
            frame.style.display = 'block';
            frame.src = site.url;
        }
    }

    // 側邊欄寬度調整
    const resizer = document.getElementById('resizer');
    const sidebar = document.getElementById('sidebar');
    let isResizing = false;

    resizer.addEventListener('mousedown', () => { isResizing = true; frame.style.pointerEvents = 'none'; });
    document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        let w = e.clientX;
        if (w > 180 && w < 500) sidebar.style.width = w + 'px';
    });
    document.addEventListener('mouseup', () => { isResizing = false; frame.style.pointerEvents = 'auto'; });
</script>

</body>
</html>
